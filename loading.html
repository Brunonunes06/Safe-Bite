<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando - Safe-Bite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .loading-container {
      text-align: center;
      color: white;
      z-index: 10;
      position: relative;
    }

    .logo-container {
      margin-bottom: 3rem;
      animation: float 3s ease-in-out infinite;
    }

    .logo {
      font-size: 4rem;
      color: #2ecc71;
      text-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-text {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 1rem;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-text {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 2rem;
      opacity: 0.9;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    .progress-container {
      width: 590px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 2rem;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      border-radius: 10px;
      animation: progress 3s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
    }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #2ecc71;
      border-radius: 50%;
      animation: dotBounce 1.5s ease-in-out infinite;
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
      max-width: 600px;
    }

    .feature-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: slideUp 0.8s ease-out forwards;
      opacity: 0;
    }

    .feature-item:nth-child(1) { animation-delay: 0.2s; }
    .feature-item:nth-child(2) { animation-delay: 0.4s; }
    .feature-item:nth-child(3) { animation-delay: 0.6s; }
    .feature-item:nth-child(4) { animation-delay: 0.8s; }

    .feature-icon {
      font-size: 2rem;
      color: #2ecc71;
      margin-bottom: 1rem;
    }

    .feature-text {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .background-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .floating-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .shape {
      position: absolute;
      background: rgba(46, 204, 113, 0.1);
      border-radius: 50%;
      animation: floatShape 20s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 70%;
      left: 80%;
      animation-delay: 3s;
    }

    .shape:nth-child(3) {
      width: 60px;
      height: 60px;
      top: 30%;
      right: 10%;
      animation-delay: 6s;
    }

    .shape:nth-child(4) {
      width: 100px;
      height: 100px;
      bottom: 20%;
      left: 20%;
      animation-delay: 9s;
    }

    /* Animações */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes progress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -30px) rotate(90deg); }
      50% { transform: translate(-20px, 20px) rotate(180deg); }
      75% { transform: translate(-30px, -20px) rotate(270deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo {
        font-size: 3rem;
      }
      
      .logo-text {
        font-size: 2rem;
      }
      
      .loading-text {
        font-size: 1rem;
      }
      
      .progress-container {
        width: 250px;
      }
      
      .features {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-top: 2rem;
      }
      
      .feature-item {
        padding: 1rem;
      }
      
      .feature-icon {
        font-size: 1.5rem;
      }
      
      .feature-text {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 2.5rem;
      }
      
      .logo-text {
        font-size: 1.5rem;
      }
      
      .features {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation">
    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>
  </div>

  <div class="loading-container">
    <div class="logo-container">
      <div class="logo">
        <i class="fas fa-leaf"></i>
      </div>
      <div class="logo-text">Safe-Bite</div>
    </div>

    <div class="loading-text">Iniciando seu assistente de segurança alimentar...</div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">
          <i class="fas fa-camera"></i>
        </div>
        <div class="feature-text">Scanner Inteligente</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div class="feature-text">Verificação de Alérgenos</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <div class="feature-text">Análise Avançada</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <i class="fas fa-mobile-alt"></i>
        </div>
        <div class="feature-text">Acesso em Qualquer Lugar</div>
      </div>
    </div>
  </div>

  <script>
    // Redirecionar após 3 segundos (comentado - não redirecionar automaticamente)
    // setTimeout(() => {
    //   window.location.href = 'index.html';
    // }, 3000);

    // Atualizar texto de carregamento
    const loadingTexts = [
      'Iniciando seu assistente de segurança alimentar...',
      'Carregando recursos de IA...',
      'Preparando sistema de análise...',
      'Quase pronto...'
    ];

    let textIndex = 0;
    const loadingTextElement = document.querySelector('.loading-text');

    setInterval(() => {
      textIndex = (textIndex + 1) % loadingTexts.length;
      if (loadingTextElement) {
        loadingTextElement.style.opacity = '0';
        setTimeout(() => {
          loadingTextElement.textContent = loadingTexts[textIndex];
          loadingTextElement.style.opacity = '0.9';
        }, 300);
      }
    }, 2000);

    // Adicionar efeito de partículas
    function createParticle() {
      const particle = document.createElement('div');
      particle.style.cssText = `
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(46, 204, 113, 0.6);
        border-radius: 50%;
        pointer-events: none;
        animation: particleFloat 3s ease-out forwards;
      `;
      
      const startX = Math.random() * window.innerWidth;
      const startY = window.innerHeight + 10;
      
      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      
      document.body.appendChild(particle);
      
      setTimeout(() => {
        particle.remove();
      }, 3000);
    }

    // Criar partículas periodicamente
    setInterval(createParticle, 200);

    // Adicionar CSS para partículas
    const particleCSS = document.createElement('style');
    particleCSS.textContent = `
      @keyframes particleFloat {
        0% {
          transform: translateY(0) translateX(0);
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100vh) translateX(${Math.random() * 200 - 100}px);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(particleCSS);
  </script>
</body>
</html>
