<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Nutri-Scan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .profile-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
    }

    .profile-header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile-main {
      flex: 1;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .profile-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .profile-header-card {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--medium-gray);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
      font-weight: 700;
      position: relative;
    }

    .avatar-upload {
      position: absolute;
      bottom: 0;
      right: 0;
      background: var(--primary-green);
      color: white;
      border: 3px solid white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .profile-info h2 {
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .profile-info p {
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .profile-badge {
      background: var(--gradient-primary);
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-section {
      margin-bottom: 2rem;
    }

    .form-section h3 {
      margin-bottom: 1.5rem;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 1rem;
      border: 2px solid var(--medium-gray);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-green);
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .dietary-restrictions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .restriction-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem;
      border: 2px solid var(--medium-gray);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .restriction-item:hover {
      border-color: var(--primary-green);
    }

    .restriction-item.selected {
      background: rgba(46, 204, 113, 0.1);
      border-color: var(--primary-green);
    }

    .restriction-item input[type="checkbox"] {
      display: none;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .btn {
      padding: 1rem 2rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-secondary {
      background: var(--light-gray);
      color: var(--text-dark);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .success-message,
    .error-message {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }

    .success-message {
      background: rgba(46, 204, 113, 0.1);
      color: var(--primary-green);
    }

    .error-message {
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--medium-gray);
      border-top: 4px solid var(--primary-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .profile-main {
        padding: 1rem;
      }

      .profile-card {
        padding: 1.5rem;
      }

      .profile-header-card {
        flex-direction: column;
        text-align: center;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .dietary-restrictions {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <!-- Header -->
    <header class="profile-header">
      <div class="profile-logo">
        <i class="fas fa-leaf"></i>
        <span>Nutri-Scan</span>
      </div>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">JD</div>
        <span id="userName">Bruno Test</span>
        <button class="btn-secondary" onclick="goToDashboard()" style="padding: 0.5rem 1rem;">
          <i class="fas fa-home"></i>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="profile-main">
      <!-- Loading State -->
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
      </div>

      <!-- Profile Form -->
      <div class="profile-card" id="profileForm" style="display: none;">
        <!-- Profile Header -->
        <div class="profile-header-card">
          <div class="profile-avatar" id="profileAvatar">
            JD
            <div class="avatar-upload">
              <i class="fas fa-camera"></i>
            </div>
          </div>
          <div class="profile-info">
            <h2 id="profileName">João da Silva</h2>
            <p id="profileEmail">joao@exemplo.com</p>
            <span class="profile-badge" id="profileBadge">Free</span>
          </div>
        </div>

        <!-- Messages -->
        <div id="successMessage" class="success-message" style="display: none;"></div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Personal Information -->
        <div class="form-section">
          <h3>
            <i class="fas fa-user"></i>
            Informações Pessoais
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="name">Nome Completo</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
          </div>
        </div>

        <!-- Dietary Restrictions -->
        <div class="form-section">
          <h3>
            <i class="fas fa-exclamation-triangle"></i>
            Restrições Alimentares
          </h3>
          <div class="dietary-restrictions" id="dietaryRestrictions">
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="gluten">
              <span>Glúten</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="lactose">
              <span>Lactose</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="peanuts">
              <span>Amendoim</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="tree_nuts">
              <span>Nozes</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="shellfish">
              <span>Frutos do mar</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="fish">
              <span>Peixe</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="eggs">
              <span>Ovos</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="soy">
              <span>Soja</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="diabetes">
              <span>Diabetes</span>
            </label>
            <label class="restriction-item">
              <input type="checkbox" name="restrictions" value="hypertension">
              <span>Hipertensão</span>
            </label>
          </div>
        </div>

        <!-- Preferences -->
        <div class="form-section">
          <h3>
            <i class="fas fa-cog"></i>
            Preferências
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="language">Idioma</label>
              <select id="language" name="language">
                <option value="pt-BR">Português (Brasil)</option>
                <option value="en-US">English</option>
              </select>
            </div>
            <div class="form-group">
              <label for="notifications">Notificações</label>
              <select id="notifications" name="notifications">
                <option value="all">Todas</option>
                <option value="important">Apenas importantes</option>
                <option value="none">Nenhuma</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button type="button" class="btn btn-secondary" onclick="cancelChanges()">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" onclick="saveProfile()">
            Salvar Alterações
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="api-config.js"></script>
  <script>
    // Profile JavaScript
    class NutriScanProfile {
      constructor() {
        this.token = localStorage.getItem('nutriScanToken');
        this.user = null;
        this.originalData = null;
        this.init();
      }

      async init() {
        if (!this.token) {
          APIUtils.redirectToLogin();
          return;
        }

        this.setupEventListeners();
        await this.loadProfile();
      }

      setupEventListeners() {
        // Dietary restrictions checkboxes
        document.querySelectorAll('.restriction-item').forEach(item => {
          item.addEventListener('click', () => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
            item.classList.toggle('selected', checkbox.checked);
          });
        });
      }

      async loadProfile() {
        try {
          this.showLoading(true);
          
          const response = await api.getProfile();
          this.user = response.user;
          this.originalData = JSON.parse(JSON.stringify(response.user));
          
          this.populateForm();
          this.showLoading(false);
        } catch (error) {
          console.error('Erro ao carregar perfil:', error);
          this.showError(APIUtils.handleError(error));
          this.showLoading(false);
        }
      }

      populateForm() {
        if (!this.user) return;

        // Personal information
        document.getElementById('name').value = this.user.name || '';
        document.getElementById('email').value = this.user.email || '';

        // Profile header
        document.getElementById('profileName').textContent = this.user.name || '';
        document.getElementById('profileEmail').textContent = this.user.email || '';
        document.getElementById('profileBadge').textContent = this.user.isPremium ? 'Premium' : 'Free';
        document.getElementById('userName').textContent = this.user.name || '';

        // Avatar
        const initials = this.user.name.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('userAvatar').textContent = initials;
        document.getElementById('profileAvatar').textContent = initials;

        // Dietary restrictions
        if (this.user.dietaryRestrictions) {
          this.user.dietaryRestrictions.forEach(restriction => {
            const checkbox = document.querySelector(`input[value="${restriction}"]`);
            if (checkbox) {
              checkbox.checked = true;
              checkbox.closest('.restriction-item').classList.add('selected');
            }
          });
        }

        // Preferences
        document.getElementById('language').value = this.user.preferences?.language || 'pt-BR';
        document.getElementById('notifications').value = this.user.preferences?.notifications || 'all';
      }

      async saveProfile() {
        try {
          this.showLoading(true);
          this.hideMessages();

          // Collect form data
          const formData = {
            name: document.getElementById('name').value,
            dietaryRestrictions: this.getSelectedRestrictions(),
            preferences: {
              language: document.getElementById('language').value,
              notifications: document.getElementById('notifications').value
            }
          };

          // Validate
          if (!formData.name.trim()) {
            throw new Error('Nome é obrigatório');
          }

          // Save to API
          const response = await api.updateProfile(formData);
          
          this.showSuccess('Perfil atualizado com sucesso!');
          this.user = response.user;
          this.originalData = JSON.parse(JSON.stringify(response.user));
          
          this.showLoading(false);
        } catch (error) {
          console.error('Erro ao salvar perfil:', error);
          this.showError(APIUtils.handleError(error));
          this.showLoading(false);
        }
      }

      getSelectedRestrictions() {
        const checkboxes = document.querySelectorAll('input[name="restrictions"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
      }

      cancelChanges() {
        if (this.originalData) {
          this.user = JSON.parse(JSON.stringify(this.originalData));
          this.populateForm();
        }
      }

      showLoading(show) {
        document.getElementById('loadingState').style.display = show ? 'flex' : 'none';
        document.getElementById('profileForm').style.display = show ? 'none' : 'block';
      }

      showSuccess(message) {
        const element = document.getElementById('successMessage');
        element.textContent = message;
        element.style.display = 'block';
        document.getElementById('errorMessage').style.display = 'none';
        
        setTimeout(() => {
          element.style.display = 'none';
        }, 5000);
      }

      showError(message) {
        const element = document.getElementById('errorMessage');
        element.textContent = message;
        element.style.display = 'block';
        document.getElementById('successMessage').style.display = 'none';
        
        setTimeout(() => {
          element.style.display = 'none';
        }, 5000);
      }

      hideMessages() {
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'none';
      }

      goToDashboard() {
        APIUtils.redirectToDashboard();
      }
    }

    // Global functions
    function goToDashboard() {
      APIUtils.redirectToDashboard();
    }

    function saveProfile() {
      window.profileInstance.saveProfile();
    }

    function cancelChanges() {
      window.profileInstance.cancelChanges();
    }

    // Initialize profile when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      window.profileInstance = new NutriScanProfile();
    });
  </script>
  
  <!-- Scripts necessários -->
  <script src="api-config.js"></script>
  <script src="login-system.js"></script>
</body>
</html>
