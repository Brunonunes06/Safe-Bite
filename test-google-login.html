<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Login Google - Safe-Bite</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .test-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }
    .test-btn {
      width: 100%;
      padding: 15px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 15px;
    }
    .test-btn:hover {
      background: #f8f9fa;
      border-color: #4285f4;
      transform: translateY(-2px);
    }
    .test-btn img {
      width: 20px;
      height: 20px;
    }
    .status {
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .success {
      background: rgba(46, 204, 113, 0.1);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }
    .error {
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h2>Teste Login Google</h2>
    <p>Teste o login com Google do sistema Safe-Bite</p>
    
    <button class="test-btn" onclick="testGoogleLogin()">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
      <span>Testar Login com Google</span>
    </button>
    
    <button class="test-btn" onclick="testGoogleSignup()">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
      <span>Testar Cadastro com Google</span>
    </button>
    
    <button class="test-btn" onclick="goToSignup()" style="background: #2ecc71; color: white; border-color: #2ecc71;">
      <span>Ir para Página de Cadastro</span>
    </button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="api-config.js"></script>
  <script src="login-system.js"></script>
  <script src="signup-system.js"></script>
  
  <script>
    function testGoogleLogin() {
      showStatus('Testando login com Google...', 'info');
      
      if (typeof loginSystem !== 'undefined' && loginSystem.handleGoogleLogin) {
        loginSystem.handleGoogleLogin();
      } else {
        showStatus('Erro: Sistema de login não encontrado', 'error');
      }
    }
    
    function testGoogleSignup() {
      showStatus('Testando cadastro com Google...', 'info');
      
      if (typeof signupSystem !== 'undefined' && signupSystem.handleGoogleSignup) {
        signupSystem.handleGoogleSignup();
      } else {
        showStatus('Erro: Sistema de cadastro não encontrado', 'error');
      }
    }
    
    function goToSignup() {
      window.location.href = 'signup.html';
    }
    
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      status.style.display = 'block';
    }
    
    // Verificar se sistemas carregaram
    setTimeout(() => {
      if (typeof loginSystem === 'undefined') {
        showStatus('Aviso: loginSystem não carregou', 'error');
      }
      if (typeof signupSystem === 'undefined') {
        showStatus('Aviso: signupSystem não carregou', 'error');
      }
      if (typeof loginSystem !== 'undefined' && typeof signupSystem !== 'undefined') {
        showStatus('Sistemas carregados com sucesso!', 'success');
      }
    }, 1000);
  </script>
</body>
</html>
